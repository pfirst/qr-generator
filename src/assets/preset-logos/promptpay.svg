     separates the mark from the QR modules without a hard white SQUARE. Do NOT strip the
     bubble: cropping to the bare marks is what forced qr-code-styling's square clear and
     made the "hard white box" the owner rejected. Render with logoBg='none'.
     viewBox is widened to the LEFT so the inner mark SQUARE (navy 2x2 grid, centre
     ~340.6,245.6) — NOT the whole bubble+tail — sits dead-centre; the green tail
     still shows, off to the bottom-right. Don't reset it to the artwork's 0 0 740.4 492. -->
